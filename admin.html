<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c2410c" />
    <title>新火教育制度手册后台管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app admin-app">
      <section class="login-panel" id="loginPanel">
        <div class="brand-row">
          <div class="brand-mark">新</div>
          <div>
            <h1>后台管理登录</h1>
            <p>新火教育制度手册</p>
          </div>
        </div>

        <form class="login-form" id="loginForm">
          <label>
            账号
            <input id="loginAccount" autocomplete="username" placeholder="请输入管理员账号" required />
          </label>
          <label>
            密码
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入密码" required />
          </label>
          <button class="primary-button" type="submit">登录后台</button>
        </form>
      </section>

      <section class="admin-workspace" id="adminWorkspace" hidden>
        <header class="mobile-hero">
          <div class="brand-row">
            <div class="brand-mark">新</div>
            <div>
              <h1>制度后台管理</h1>
              <p>新增、编辑、删除和维护制度资料</p>
            </div>
          </div>
          <button class="secondary-button" id="logoutButton" type="button">退出登录</button>
        </header>

        <div class="admin-grid">
          <section class="admin-panel">
            <div class="section-heading">
              <h2>新增 / 编辑制度</h2>
              <p id="formHint">填写后保存到制度库</p>
            </div>

            <form class="policy-form" id="policyForm">
              <input type="hidden" id="policyId" />
              <label>
                制度名称
                <input id="policyTitle" required placeholder="例如：员工考勤管理制度" />
              </label>
              <div class="form-row">
                <label>
                  所属部门
                  <select id="policyDepartment" required>
                    <option value="人力行政部">人力行政部</option>
                    <option value="教学教研部">教学教研部</option>
                    <option value="课程顾问部">课程顾问部</option>
                    <option value="市场运营部">市场运营部</option>
                    <option value="财务部">财务部</option>
                    <option value="校区管理部">校区管理部</option>
                    <option value="综合管理部">综合管理部</option>
                  </select>
                </label>
                <label>
                  制度类型
                  <select id="policyCategory" required>
                    <option value="人事制度">人事制度</option>
                    <option value="教学制度">教学制度</option>
                    <option value="财务制度">财务制度</option>
                    <option value="行政制度">行政制度</option>
                    <option value="安全制度">安全制度</option>
                    <option value="服务规范">服务规范</option>
                    <option value="操作流程">操作流程</option>
                  </select>
                </label>
              </div>
              <div class="form-row">
                <label>
                  生效状态
                  <select id="policyStatus">
                    <option>现行有效</option>
                    <option>重点执行</option>
                    <option>试行</option>
                    <option>已停用</option>
                  </select>
                </label>
                <label>
                  更新时间
                  <input id="policyUpdated" type="date" required />
                </label>
              </div>
              <div class="form-row">
                <label>
                  执行开始时间
                  <input id="policyExecuteStart" type="date" />
                </label>
                <label>
                  执行结束时间
                  <input id="policyExecuteEnd" type="date" />
                </label>
              </div>
              <label>
                制度摘要
                <textarea id="policySummary" required rows="3" placeholder="简要说明这条制度解决什么问题"></textarea>
              </label>
              <label>
                制度正文
                <textarea id="policyContent" required rows="8" placeholder="可直接粘贴完整制度内容，每段一行更便于阅读"></textarea>
              </label>
              <div class="paste-upload" id="imagePasteBox" tabindex="0">
                <strong>图片展示</strong>
                <p>点击选择图片，或点击此区域后直接粘贴截图/复制的图片。</p>
                <input id="policyImage" type="file" accept="image/*" />
              </div>
              <div class="media-preview" id="mediaPreview"></div>

              <div class="form-actions">
                <button class="primary-button" type="submit">保存制度</button>
                <button class="secondary-button" id="resetFormButton" type="button">清空表单</button>
              </div>
            </form>
          </section>

          <section class="admin-panel wide-panel">
            <div class="section-heading">
              <h2>制度库管理</h2>
              <div class="heading-actions">
                <p id="adminCount">0 条</p>
                <button class="secondary-button" id="exportButton" type="button">导出备份</button>
              </div>
            </div>
            <div class="admin-filters">
              <input id="adminSearchInput" type="search" placeholder="搜索制度名称、部门、类型或正文" />
              <select id="adminDepartmentFilter"></select>
              <select id="adminCategoryFilter"></select>
              <select id="adminStatusFilter">
                <option value="">全部状态</option>
                <option value="现行有效">现行有效</option>
                <option value="重点执行">重点执行</option>
                <option value="试行">试行</option>
                <option value="已停用">已停用</option>
              </select>
            </div>
            <div class="admin-list" id="adminPolicyList"></div>
          </section>

          <section class="admin-panel">
            <div class="section-heading">
              <h2>基础选项管理</h2>
              <p>维护下拉选项</p>
            </div>
            <div class="options-manager">
              <div class="option-box">
                <h3>所属部门</h3>
                <div class="option-input-row">
                  <input id="newDepartmentInput" placeholder="新增部门名称" />
                  <button class="secondary-button" id="addDepartmentButton" type="button">新增</button>
                </div>
                <div class="option-list" id="departmentOptionList"></div>
              </div>
              <div class="option-box">
                <h3>制度类型</h3>
                <div class="option-input-row">
                  <input id="newCategoryInput" placeholder="新增制度类型" />
                  <button class="secondary-button" id="addCategoryButton" type="button">新增</button>
                </div>
                <div class="option-list" id="categoryOptionList"></div>
              </div>
            </div>
          </section>

          <section class="admin-panel">
            <div class="section-heading">
              <h2>账号密码管理</h2>
              <p>修改后台登录信息</p>
            </div>
            <form class="policy-form" id="accountForm">
              <label>
                管理员账号
                <input id="adminAccountInput" autocomplete="username" required />
              </label>
              <div class="form-row">
                <label>
                  新密码
                  <input id="adminPasswordInput" type="password" autocomplete="new-password" placeholder="不修改可留空" />
                </label>
                <label>
                  确认新密码
                  <input id="adminPasswordConfirmInput" type="password" autocomplete="new-password" placeholder="再次输入新密码" />
                </label>
              </div>
              <div class="form-actions">
                <button class="primary-button" type="submit">保存账号密码</button>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
